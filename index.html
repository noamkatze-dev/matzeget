<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Analysis — Auto Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background:#ffffff; overflow:hidden; width:100vw; height:100vh; cursor:none; font-family:'Heebo',sans-serif; }
#scene { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
#videoWrapper { position:relative; width:100vw; height:100vh; overflow:hidden; }
#mainVideo { display:block; width:100%; height:100%; object-fit:cover; }
#dotCanvas { position:absolute; inset:0; pointer-events:none; z-index:1; }
#annLayer  { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2; transition:opacity 0.3s; }

.ann {
  position:absolute;
  font-family:'Heebo',sans-serif;
  font-size:11px; font-weight:700;
  color:#e01a00;
  letter-spacing:0.06em;
  white-space:nowrap;
  text-shadow:none;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.5s ease, filter 0.5s ease;
}

#gazeDot {
  position:fixed; width:22px; height:22px; border-radius:50%;
  border:2px solid rgba(224,26,0,0.85);
  background:rgba(224,26,0,0.12);
  transform:translate(-50%,-50%); pointer-events:none; z-index:50;
}

/* ── mode indicator (replaces the mode-selection UI, since this runs unattended) ── */
#modeIndicator {
  position:fixed; bottom:16px; right:16px; z-index:60;
  font-family:'Heebo',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:0.18em; color:#111111;
  background:#ffffff; border:1.5px solid #dddddd; padding:10px 16px;
  display:flex; align-items:center; gap:8px; white-space:nowrap;
}
#modeIndicator .dot { color:#e01a00; font-size:8px; }
#modeIndicator .idx { color:#bbbbbb; font-weight:400; }
</style>
</head>
<body>

<div id="scene">
  <div id="videoWrapper">
    <video id="mainVideo" src="statue.mp4" autoplay loop muted playsinline></video>
    <canvas id="dotCanvas"></canvas>
    <div id="annLayer"></div>
  </div>
</div>

<div id="gazeDot"></div>

<div id="modeIndicator">
  <span class="dot">●</span>
  <span id="modeIndicatorName">GAZE POINT</span>
  <span class="idx" id="modeIndicatorIdx">01 / 06</span>
</div>

<!-- hidden canvases for analysis -->
<canvas id="anaC" style="display:none" width="160" height="90"></canvas>
<canvas id="preC" style="display:none" width="160" height="90"></canvas>
<canvas id="aoiC" style="display:none" width="320" height="180"></canvas>
<canvas id="aoiP" style="display:none" width="320" height="180"></canvas>

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════════════
   CONSTANTS
   ══════════════════════════════════════════════════════════════════════ */

const W_ANA        = 160;
const H_ANA        = 90;
const N_ANN        = 250;
const DOT_STEP     = 2;
const DOT_THRESH   = 10;
const ANA_INTERVAL = 600;
const REVEAL_FRAC  = 0.030;
const DOT_FADE_MS  = 5000;
const W_AOI        = 320;
const H_AOI        = 180;
const AOI_INTERVAL = 900;
const MAX_AOI      = 16;
const AOI_FADE_MS  = 5000;
const CLUSTER_DIST = 0.07;
const AOI_MIN_W    = 0.04;
const AOI_MIN_H    = 0.03;
const AOI_MAX_SIZE = 0.40;

const FIX_DISPERSION   = 0.04;
const FIX_MIN_DURATION = 150;
const SAC_VELOCITY     = 0.8;
const SAC_MIN_AMP      = 0.03;
const W_HEAT = 200, H_HEAT = 112;
const HEAT_SIGMA  = 0.07;
const HEAT_WEIGHT = 0.18;
const HEAT_DECAY  = 0.9975;

const GAZE_LERP  = 0.08;
const CAL_VAR_THRESH = 0.0012;
const BUF_MAX = 30;

/* ── simulated (automatic) gaze parameters — replaces head/mouse tracking ── */
const SIM_MIN_DWELL  = 1400;
const SIM_MAX_DWELL  = 3200;
const SIM_DRIFT_LERP = 0.02;

/* ── auto mode cycling ── */
const MODE_ORDER = ['GAZE', 'FIXATION', 'SACCADE', 'SCANPATH', 'HEATMAP', 'FIRSTFIX'];
const MODE_LABELS = {
  GAZE:     'GAZE POINT',
  FIXATION: 'FIXATION',
  SACCADE:  'SACCADE',
  SCANPATH: 'SCAN PATH',
  HEATMAP:  'HEATMAP',
  FIRSTFIX: 'FIRST FIXATION'
};
const MODE_DWELL_MS = 9000; // כמה זמן כל מצב מוצג לפני שהוא עובר לבא

/* ══════════════════════════════════════════════════════════════════════
   DOM
   ══════════════════════════════════════════════════════════════════════ */

const mainVideo    = document.getElementById('mainVideo');
const videoWrapper = document.getElementById('videoWrapper');
const dotCanvas    = document.getElementById('dotCanvas');
const dotCtx       = dotCanvas.getContext('2d');
const annLayer     = document.getElementById('annLayer');
const gazeDot      = document.getElementById('gazeDot');

const anaCtx  = document.getElementById('anaC').getContext('2d', { willReadFrequently:true });
const preCtx  = document.getElementById('preC').getContext('2d', { willReadFrequently:true });
const aoiCtx  = document.getElementById('aoiC').getContext('2d', { willReadFrequently:true });
const aoiPCtx = document.getElementById('aoiP').getContext('2d', { willReadFrequently:true });

const modeIndicatorName = document.getElementById('modeIndicatorName');
const modeIndicatorIdx  = document.getElementById('modeIndicatorIdx');

/* ══════════════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════════════ */

let activeMode = 'GAZE';

let dotPool  = [];
let aoiPool  = [];
let prevPx   = null;
let lastAnaTs = -9999;
let lastAoiTs = -9999;

let fixationHistory = [];
let currentFixation = null;
let scanPathHistory = [];
let saccadeHistory  = [];
let saccadeActive   = false;
let saccadeStart    = null;
let heatmap         = new Float32Array(W_HEAT * H_HEAT);
let heatCanvas, heatCtx;
let firstFix        = null;
let firstFixDone    = false;
let firstFixModeTs  = 0;
let sessionStartTs  = 0;

let rawGX = 0.5, rawGY = 0.5;
let sGX   = 0.5, sGY   = 0.5;
let gazeOn     = true; // תמיד "פעיל" - אין המתנה לגישת מצלמה
let lastGazeTs = 0;

// offXBuf/offYBuf כאן משמשים למדידת "יציבות" של המבט המדומה עצמו
// (עד כמה הוא נייח כרגע) - באותה צורה שבה שימשו במקור למדידת יציבות הראש.
const offXBuf = [], offYBuf = [];

window._gazeHistory = [];
window._dotPts      = null;

/* ── מטרת המבט המדומה הנוכחית ── */
let simGX = 0.5, simGY = 0.5;

/* ══════════════════════════════════════════════════════════════════════
   SHARED STABILITY + CLASSIFIER
   ══════════════════════════════════════════════════════════════════════ */

function currentStability() {
  const N = Math.min(offXBuf.length, 20);
  if (N < 8) return 0;
  const xs = offXBuf.slice(-N), ys = offYBuf.slice(-N);
  const mx = xs.reduce((a,b) => a+b, 0) / N;
  const my = ys.reduce((a,b) => a+b, 0) / N;
  const vx = xs.reduce((a,b) => a+(b-mx)**2, 0) / N;
  const vy = ys.reduce((a,b) => a+(b-my)**2, 0) / N;
  return Math.max(0, Math.min(1, 1 - (vx+vy) / CAL_VAR_THRESH));
}

function detectSearchPattern() {
  const h = window._gazeHistory;
  if (h.length < 6) return false;
  const recent = h.slice(-6);
  const dxs = [], dys = [];
  for (let i = 1; i < recent.length; i++) {
    dxs.push(recent[i].x - recent[i-1].x);
    dys.push(recent[i].y - recent[i-1].y);
  }
  const avgDx = dxs.reduce((a,b) => a+b, 0) / dxs.length;
  const avgDy = dys.reduce((a,b) => a+b, 0) / dys.length;
  const cX = dxs.every(d => Math.sign(d) === Math.sign(avgDx));
  const cY = dys.every(d => Math.sign(d) === Math.sign(avgDy));
  return (Math.abs(avgDx) > 0.02 || Math.abs(avgDy) > 0.02) && (cX || cY);
}

function classify(a, ts, scanSpeed, microMovement) {
  const stab = currentStability();
  if (a.dwellTime > 900 && stab > 0.75)                             return 'ATTENTION LOCKED';
  if (a.revisitCount >= 2 && a.totalDwellTime > 900)                return 'REPEATED GLANCE';
  if (a.revisitCount >= 2 && a.totalDwellTime < 900 && stab < 0.5) return 'FOCUS UNSTABLE';
  if (a.dwellTime > 500 && stab < 0.4 && microMovement > 0.015)    return 'VISUAL DRIFT';
  if (scanSpeed > 8 && a.dwellTime < 150 && stab < 0.3)            return 'SCAN WITHOUT PROCESSING';
  if (a.dwellTime > 200 && a.dwellTime < 700 && stab < 0.6)        return 'LOW ENGAGEMENT';
  if (detectSearchPattern() && scanSpeed >= 2)                      return 'SEARCH PATTERN';
  return 'UNCLASSIFIED';
}

/* ══════════════════════════════════════════════════════════════════════
   GAZE MODE — SOBEL DOT POOL
   ══════════════════════════════════════════════════════════════════════ */

function buildDotPool() {
  annLayer.innerHTML = '';
  dotPool = [];
  for (let i = 0; i < N_ANN; i++) {
    const el = document.createElement('span');
    el.className = 'ann';
    annLayer.appendChild(el);
    const jitterX = ((i * 137.508) % 1 - 0.5) * 0.06;
    const jitterY = ((i * 97.314)  % 1 - 0.5) * 0.03;
    dotPool.push({
      el,
      x:0.5, y:0.5, jitterX, jitterY, labelX:0.5, labelY:0.5,
      active:false, visible:false, shownAt:0,
      state:'UNCLASSIFIED',
      dwellTime:0, totalDwellTime:0, revisitCount:0, lastVisitTs:0,
      timeBetweenVisits:0, isNear:false, visitDwells:[],
      _visitStart:0, _lastClassifyTs:0,
      classificationBuffer:[], classificationStableTime:0, stableFor:0
    });
  }
}

function sobel(px, w, h) {
  const g  = new Float32Array(w * h);
  const mg = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const o = i * 4;
    g[i] = 0.299 * px[o] + 0.587 * px[o+1] + 0.114 * px[o+2];
  }
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const i  = y*w+x;
      const tl = g[i-w-1], tc = g[i-w], tr = g[i-w+1];
      const ml = g[i-1],               mr = g[i+1];
      const bl = g[i+w-1], bc = g[i+w], br = g[i+w+1];
      mg[i] = Math.hypot((tr+2*mr+br)-(tl+2*ml+bl), (bl+2*bc+br)-(tl+2*tc+tr));
    }
  }
  return mg;
}

function analyzeDots() {
  if (mainVideo.readyState < 2) return;
  anaCtx.drawImage(mainVideo, 0, 0, W_ANA, H_ANA);
  const id = anaCtx.getImageData(0, 0, W_ANA, H_ANA);
  const mg = sobel(id.data, W_ANA, H_ANA);

  const all = [];
  for (let y = 1; y < H_ANA-1; y += DOT_STEP) {
    for (let x = 1; x < W_ANA-1; x += DOT_STEP) {
      const i = y * W_ANA + x;
      if (mg[i] >= DOT_THRESH) all.push({ i, mag: mg[i] });
    }
  }
  all.sort((a,b) => b.mag - a.mag);
  if (all.length > N_ANN) all.length = N_ANN;

  const pts = [];
  for (const { i } of all) {
    pts.push({
      nx: Math.max(0.01, Math.min(0.99, (i % W_ANA) / W_ANA)),
      ny: Math.max(0.01, Math.min(0.99, Math.floor(i / W_ANA) / H_ANA))
    });
  }
  window._dotPts = pts;

  const n = Math.min(pts.length, N_ANN);
  for (let i = 0; i < N_ANN; i++) {
    const a = dotPool[i];
    if (i < n) {
      const p = pts[i];
      a.active = true;
      if (!a.visible) {
        const moved = Math.hypot(a.x - p.nx, a.y - p.ny) > 0.05;
        if (moved) {
          a.dwellTime=0; a.totalDwellTime=0; a.revisitCount=0;
          a.lastVisitTs=0; a.timeBetweenVisits=0; a.isNear=false;
          a.visitDwells=[]; a._visitStart=0; a._lastClassifyTs=0;
          a.classificationBuffer=[]; a.classificationStableTime=0; a.stableFor=0;
          a.shownAt=0;
        }
        a.x = p.nx; a.y = p.ny;
        a.labelX = Math.max(0.01, Math.min(0.99, p.nx + a.jitterX));
        a.labelY = Math.max(0.01, Math.min(0.99, p.ny + a.jitterY));
      }
    } else {
      a.active = false;
      if (!a.visible) { a.el.textContent = ''; a.el.style.opacity = '0'; a.el.style.filter = 'none'; }
    }
  }

  preCtx.drawImage(mainVideo, 0, 0, W_ANA, H_ANA);
  prevPx = preCtx.getImageData(0, 0, W_ANA, H_ANA).data.slice();
}

function revealDot(a, label, ts) {
  a.state = label; a.visible = true; a.shownAt = ts;
  a.el.textContent = label;
  a.el.style.left      = (a.labelX * 100).toFixed(2) + '%';
  a.el.style.top       = (a.labelY * 100).toFixed(2) + '%';
  a.el.style.transform = a.labelX > 0.62
    ? 'translate(calc(-100% - 12px), -50%)'
    : 'translate(12px, -50%)';
  a.el.style.opacity = '1';
  a.el.style.filter  = 'none';
}

function hideDot(a) {
  a.visible = false; a.shownAt = 0;
  a.el.style.transition = 'opacity 0.8s ease, filter 0.8s ease';
  a.el.style.opacity    = '0';
  a.el.style.filter     = 'blur(4px)';
}

function applyDotGaze(ts, gpx, gpy, W, H, scanSpeed, microMovement) {
  const revR = Math.min(W, H) * REVEAL_FRAC;
  for (const a of dotPool) {
    if (!a.active) continue;
    if (a.visible && a.shownAt > 0 && ts - a.shownAt > DOT_FADE_MS) { hideDot(a); continue; }

    const d    = Math.hypot(a.x * W - gpx, a.y * H - gpy);
    const near = d < revR;

    if (near && !a.isNear) {
      a.isNear = true; a.revisitCount++;
      if (a.lastVisitTs > 0) a.timeBetweenVisits = ts - a.lastVisitTs;
      a._visitStart = ts;
    }
    if (near && a.isNear) {
      a.dwellTime = ts - a._visitStart;
      if (ts - a._lastClassifyTs > 200) {
        a._lastClassifyTs = ts;
        const live = classify(a, ts, scanSpeed, microMovement);
        if (live !== 'UNCLASSIFIED') {
          a.classificationBuffer.push(live);
          if (a.classificationBuffer.length > 5) a.classificationBuffer.shift();
          const consistent = a.classificationBuffer.every(v => v === live);
          consistent ? (a.classificationStableTime += 200) : (a.classificationStableTime = 0);
          if (!a.visible && a.classificationStableTime > 250) revealDot(a, live, ts);
          else if (a.visible && live !== a.state && a.classificationStableTime > 250) {
            a.state = live; a.el.textContent = live;
          }
        }
      }
    }
    if (!near && a.isNear) {
      a.isNear = false;
      a.visitDwells.push(a.dwellTime);
      a.totalDwellTime += a.dwellTime;
      a.lastVisitTs = ts; a.dwellTime = 0;
      if (!a.visible) {
        const exitState = classify(a, ts, scanSpeed, microMovement);
        if (exitState !== 'UNCLASSIFIED') revealDot(a, exitState, ts);
      }
    }
  }
}

/* ══════════════════════════════════════════════════════════════════════
   GAZE MODE — AOI REGIONS
   ══════════════════════════════════════════════════════════════════════ */

function sobelMag(px, w, h) {
  const g  = new Float32Array(w * h);
  const mg = new Float32Array(w * h);
  for (let i = 0; i < w*h; i++) {
    const o = i * 4;
    g[i] = 0.299 * px[o] + 0.587 * px[o+1] + 0.114 * px[o+2];
  }
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const i  = y*w+x;
      const tl = g[i-w-1], tc = g[i-w], tr = g[i-w+1];
      const ml = g[i-1],               mr = g[i+1];
      const bl = g[i+w-1], bc = g[i+w], br = g[i+w+1];
      mg[i] = Math.hypot((tr+2*mr+br)-(tl+2*ml+bl), (bl+2*bc+br)-(tl+2*tc+tr));
    }
  }
  return mg;
}

function detectAOI(px, w, h) {
  const mg = sobelMag(px, w, h);
  const THRESH = 20, STEP = 3;
  const pts = [];
  for (let y = 2; y < h-2; y += STEP) {
    for (let x = 2; x < w-2; x += STEP) {
      if (mg[y*w+x] >= THRESH) pts.push({ nx:x/w, ny:y/h, mag:mg[y*w+x] });
    }
  }
  if (!pts.length) return [];
  pts.sort((a,b) => b.mag - a.mag);

  const used = new Uint8Array(pts.length);
  const regions = [];
  for (let i = 0; i < pts.length && regions.length < MAX_AOI*4; i++) {
    if (used[i]) continue;
    const seed = pts[i];
    let x0=seed.nx, x1=seed.nx, y0=seed.ny, y1=seed.ny, count=1;
    used[i] = 1;
    for (let j = i+1; j < pts.length; j++) {
      if (used[j]) continue;
      if (Math.hypot(pts[j].nx-seed.nx, pts[j].ny-seed.ny) < CLUSTER_DIST) {
        x0=Math.min(x0,pts[j].nx); x1=Math.max(x1,pts[j].nx);
        y0=Math.min(y0,pts[j].ny); y1=Math.max(y1,pts[j].ny);
        count++; used[j]=1;
      }
    }
    if (count < 4) continue;
    const pad=0.022;
    const rx=Math.max(0,x0-pad), ry=Math.max(0,y0-pad);
    const rw=Math.min(1,x1+pad)-rx, rh=Math.min(1,y1+pad)-ry;
    if (rw<AOI_MIN_W || rh<AOI_MIN_H || rw>AOI_MAX_SIZE || rh>AOI_MAX_SIZE) continue;
    regions.push({ x:rx,y:ry,w:rw,h:rh,cx:rx+rw/2,cy:ry+rh/2 });
  }
  const kept = [];
  for (const r of regions) {
    let dup = false;
    for (const k of kept) {
      if (Math.hypot(r.cx-k.cx,r.cy-k.cy) < CLUSTER_DIST*1.4) { dup=true; break; }
    }
    if (!dup) kept.push(r);
    if (kept.length >= MAX_AOI) break;
  }
  return kept;
}

function analyzeAOI() {
  if (mainVideo.readyState < 2) return;
  aoiCtx.drawImage(mainVideo, 0, 0, W_AOI, H_AOI);
  const id      = aoiCtx.getImageData(0, 0, W_AOI, H_AOI);
  const regions = detectAOI(id.data, W_AOI, H_AOI);
  const newPool = [];

  for (const r of regions) {
    let matched=null, bestD=999;
    for (const a of aoiPool) {
      const d = Math.hypot(r.cx-(a.x+a.w/2), r.cy-(a.y+a.h/2));
      if (d < bestD && d < CLUSTER_DIST*1.3) { bestD=d; matched=a; }
    }
    if (matched) {
      matched.x=r.x; matched.y=r.y; matched.w=r.w; matched.h=r.h;
      matched.cx=r.cx; matched.cy=r.cy; matched.active=true;
      newPool.push(matched);
    } else {
      const el = document.createElement('span');
      el.className = 'ann';
      annLayer.appendChild(el);
      newPool.push({
        el, x:r.x,y:r.y,w:r.w,h:r.h,cx:r.cx,cy:r.cy,
        active:true, visible:false, state:'UNCLASSIFIED', shownAt:0,
        dwellTime:0, totalDwellTime:0, revisitCount:0, lastVisitTs:0,
        timeBetweenVisits:0, isInside:false, visitDwells:[],
        _visitStart:0, _lastClassifyTs:0,
        classificationBuffer:[], classificationStableTime:0, stableFor:0
      });
    }
  }
  for (const a of aoiPool) { if (!newPool.includes(a)) a.el.remove(); }
  aoiPool = newPool;
  aoiPCtx.drawImage(mainVideo, 0, 0, W_AOI, H_AOI);
}

function revealAOI(a, label, ts) {
  a.state=label; a.visible=true; a.shownAt=ts;
  a.el.textContent=label;
  const edgeX = a.x + a.w;
  const W=dotCanvas.width, H=dotCanvas.height;
  let myPxY = (a.y + a.h*0.5) * H;
  const myPxX = edgeX * W;
  for (const b of aoiPool) {
    if (b===a || !b.visible) continue;
    const bX=(b.x+b.w)*W, bY=(b.y+b.h*0.5)*H;
    if (Math.abs(myPxX-bX)<80 && Math.abs(myPxY-bY)<18) myPxY += 18;
  }
  a.el.style.left      = (edgeX*100).toFixed(2)+'%';
  a.el.style.top       = ((myPxY/H)*100).toFixed(2)+'%';
  a.el.style.transform = edgeX>0.62 ? 'translate(calc(-100% - 8px),-50%)' : 'translate(8px,-50%)';
  a.el.style.opacity='0'; a.el.style.filter='blur(4px)';
  requestAnimationFrame(() => {
    a.el.style.transition='opacity 0.5s ease, filter 0.5s ease';
    a.el.style.opacity='1'; a.el.style.filter='blur(0px)';
  });
}

function hideAOI(a) {
  a.visible=false; a.shownAt=0;
  a.el.style.transition='opacity 0.8s ease, filter 0.8s ease';
  a.el.style.opacity='0'; a.el.style.filter='blur(4px)';
}

function applyAOIGaze(ts, scanSpeed, microMovement, dt) {
  for (const a of aoiPool) {
    if (!a.active) continue;
    if (a.visible && a.shownAt>0 && ts-a.shownAt>AOI_FADE_MS) { hideAOI(a); continue; }
    const inside = sGX>a.x && sGX<a.x+a.w && sGY>a.y && sGY<a.y+a.h;
    if (inside && !a.isInside) {
      a.isInside=true; a.revisitCount++;
      if (a.lastVisitTs>0) a.timeBetweenVisits=ts-a.lastVisitTs;
      a._visitStart=ts;
    }
    if (inside && a.isInside) {
      a.dwellTime=ts-a._visitStart;
      const stab=currentStability();
      a.stableFor = stab>0.6 ? (a.stableFor+dt*1000) : 0;
      if (ts-a._lastClassifyTs>200) {
        a._lastClassifyTs=ts;
        const live=classify(a,ts,scanSpeed,microMovement);
        if (live!=='UNCLASSIFIED') {
          a.classificationBuffer.push(live);
          if (a.classificationBuffer.length>5) a.classificationBuffer.shift();
          const consistent=a.classificationBuffer.every(v=>v===live);
          consistent ? (a.classificationStableTime+=dt*1000) : (a.classificationStableTime=0);
          if (!a.visible && a.classificationStableTime>250) revealAOI(a,live,ts);
          if (a.visible && live!==a.state && a.classificationStableTime>250) { a.state=live; a.el.textContent=live; }
        }
      }
    }
    if (!inside && a.isInside) {
      a.isInside=false;
      a.visitDwells.push(a.dwellTime);
      a.totalDwellTime+=a.dwellTime;
      a.lastVisitTs=ts; a.dwellTime=0; a.stableFor=0;
      if (!a.visible) {
        const exitState=classify(a,ts,scanSpeed,microMovement);
        if (exitState!=='UNCLASSIFIED') revealAOI(a,exitState,ts);
      }
    }
  }
}

/* ══════════════════════════════════════════════════════════════════════
   ANALYSIS — FIXATION / SACCADE / HEATMAP / FIRST FIXATION
   (run unconditionally, exactly like the original)
   ══════════════════════════════════════════════════════════════════════ */

function updateFixations(ts) {
  const gh = window._gazeHistory;
  if (gh.length < 2) return;
  const win = gh.filter(p => p.ts > ts - 600);
  if (win.length < 2) return;
  const xs = win.map(p => p.x), ys = win.map(p => p.y);
  const dispersion = (Math.max(...xs)-Math.min(...xs)) + (Math.max(...ys)-Math.min(...ys));
  if (dispersion < FIX_DISPERSION) {
    const cx = xs.reduce((a,b)=>a+b,0)/xs.length;
    const cy = ys.reduce((a,b)=>a+b,0)/ys.length;
    if (!currentFixation) {
      currentFixation = { startTs:ts, cx, cy };
    } else {
      currentFixation.cx=cx; currentFixation.cy=cy;
      currentFixation.duration=ts-currentFixation.startTs;
    }
  } else {
    if (currentFixation) {
      const duration = ts - currentFixation.startTs;
      if (duration >= FIX_MIN_DURATION) {
        const fixEntry = { x:currentFixation.cx, y:currentFixation.cy, startTs:currentFixation.startTs, endTs:ts, duration };
        fixationHistory.push(fixEntry);
        if (fixationHistory.length > 50) fixationHistory.shift();
        if (activeMode === 'SCANPATH') {
          scanPathHistory.push(fixEntry);
          if (scanPathHistory.length > 14) scanPathHistory.shift();
        }
      }
      currentFixation = null;
    }
  }
}

function updateSaccades(ts) {
  const gh = window._gazeHistory;
  if (gh.length < 2) return;
  const last=gh[gh.length-1], prev=gh[gh.length-2];
  const dt=(last.ts-prev.ts)/1000;
  if (dt<=0) return;
  const velocity=Math.hypot(last.x-prev.x,last.y-prev.y)/dt;
  if (velocity >= SAC_VELOCITY) {
    if (!saccadeActive) { saccadeActive=true; saccadeStart={x:prev.x,y:prev.y,ts:prev.ts}; }
  } else {
    if (saccadeActive && saccadeStart) {
      const amp=Math.hypot(last.x-saccadeStart.x,last.y-saccadeStart.y);
      if (amp>=SAC_MIN_AMP) {
        saccadeHistory.push({ fromX:saccadeStart.x,fromY:saccadeStart.y, toX:last.x,toY:last.y, startTs:saccadeStart.ts,endTs:ts,duration:ts-saccadeStart.ts });
        if (saccadeHistory.length>20) saccadeHistory.shift();
      }
      saccadeActive=false; saccadeStart=null;
    }
  }
}

function updateHeatmap() {
  for (let i=0; i<heatmap.length; i++) heatmap[i]*=HEAT_DECAY;
  const gx=sGX*W_HEAT, gy=sGY*H_HEAT;
  const sigma=HEAT_SIGMA*Math.max(W_HEAT,H_HEAT);
  const r=Math.ceil(3*sigma);
  const x0=Math.max(0,Math.floor(gx-r)), x1=Math.min(W_HEAT-1,Math.ceil(gx+r));
  const y0=Math.max(0,Math.floor(gy-r)), y1=Math.min(H_HEAT-1,Math.ceil(gy+r));
  const inv2s2=1/(2*sigma*sigma);
  for (let y=y0;y<=y1;y++) {
    for (let x=x0;x<=x1;x++) {
      const d2=(x-gx)**2+(y-gy)**2;
      heatmap[y*W_HEAT+x]+=HEAT_WEIGHT*Math.exp(-d2*inv2s2);
    }
  }
}

function updateFirstFix() {
  if (activeMode !== 'FIRSTFIX') return;
  if (firstFixDone) return;
  const recent = fixationHistory.filter(f => f.startTs >= firstFixModeTs);
  if (recent.length > 0) {
    firstFix = recent[0];
    firstFixDone = true;
  }
}

/* ══════════════════════════════════════════════════════════════════════
   DRAW — one function per mode (identical drawing logic to the original)
   ══════════════════════════════════════════════════════════════════════ */

function drawGazeMode() {
  const W=dotCanvas.width, H=dotCanvas.height;
  if (window._dotPts) {
    dotCtx.fillStyle='rgba(224,26,0,0.82)';
    dotCtx.beginPath();
    for (const p of window._dotPts) dotCtx.rect(p.nx*W-1,p.ny*H-1,2,2);
    dotCtx.fill();
  }
  for (const a of aoiPool) {
    if (!a.active||!a.visible) continue;
    const sx=a.x*W,sy=a.y*H,sw=a.w*W,sh=a.h*H;
    dotCtx.strokeStyle='rgba(224,26,0,0.7)'; dotCtx.lineWidth=1;
    dotCtx.strokeRect(sx,sy,sw,sh);
    const c=Math.min(sw,sh)*0.25;
    dotCtx.strokeStyle='rgba(224,26,0,0.9)'; dotCtx.lineWidth=1.5;
    [[sx,sy,c,0,0,c],[sx+sw,sy,-c,0,0,c],[sx,sy+sh,c,0,0,-c],[sx+sw,sy+sh,-c,0,0,-c]]
      .forEach(([x,y,dx1,dy1,dx2,dy2])=>{
        dotCtx.beginPath(); dotCtx.moveTo(x+dx1,y+dy1); dotCtx.lineTo(x,y); dotCtx.lineTo(x+dx2,y+dy2); dotCtx.stroke();
      });
  }
}

function drawFixations(ts) {
  const W=dotCanvas.width, H=dotCanvas.height;
  for (const fix of fixationHistory.slice(-10)) {
    const age=ts-fix.endTs;
    const opacity=Math.max(0,1-age/4000);
    if (opacity<=0) continue;
    const cx=fix.x*W, cy=fix.y*H;
    const r=Math.min(8+fix.duration/80,44);
    dotCtx.beginPath(); dotCtx.arc(cx,cy,r,0,Math.PI*2);
    dotCtx.fillStyle=`rgba(224,26,0,${opacity*0.18})`; dotCtx.fill();
    dotCtx.beginPath(); dotCtx.arc(cx,cy,r,0,Math.PI*2);
    dotCtx.strokeStyle=`rgba(224,26,0,${opacity})`; dotCtx.lineWidth=2; dotCtx.stroke();
    if (fix.duration>300) {
      dotCtx.fillStyle=`rgba(224,26,0,${opacity})`;
      dotCtx.font='bold 9px Heebo'; dotCtx.textAlign='center'; dotCtx.textBaseline='alphabetic';
      dotCtx.fillText(`${Math.round(fix.duration)}ms`,cx,cy+r+13);
    }
  }
  if (currentFixation) {
    const pulse=3+Math.sin(ts/160)*3;
    const cx=currentFixation.cx*W, cy=currentFixation.cy*H;
    dotCtx.beginPath(); dotCtx.arc(cx,cy,pulse,0,Math.PI*2);
    dotCtx.fillStyle='rgba(224,26,0,1)'; dotCtx.fill();
  }
}

function drawSaccades(ts) {
  const W=dotCanvas.width, H=dotCanvas.height;
  for (const sac of saccadeHistory.slice(-8)) {
    const age=ts-sac.endTs;
    const opacity=Math.max(0,1-age/2500);
    if (opacity<=0) continue;
    const fx=sac.fromX*W, fy=sac.fromY*H, tx=sac.toX*W, ty=sac.toY*H;
    dotCtx.beginPath(); dotCtx.moveTo(fx,fy); dotCtx.lineTo(tx,ty);
    dotCtx.strokeStyle=`rgba(224,26,0,${opacity})`; dotCtx.lineWidth=2; dotCtx.stroke();
    const angle=Math.atan2(ty-fy,tx-fx), aLen=10;
    dotCtx.beginPath();
    dotCtx.moveTo(tx,ty);
    dotCtx.lineTo(tx-aLen*Math.cos(angle-Math.PI/6),ty-aLen*Math.sin(angle-Math.PI/6));
    dotCtx.lineTo(tx-aLen*Math.cos(angle+Math.PI/6),ty-aLen*Math.sin(angle+Math.PI/6));
    dotCtx.closePath();
    dotCtx.fillStyle=`rgba(224,26,0,${opacity})`; dotCtx.fill();
  }
  if (saccadeActive && saccadeStart) {
    dotCtx.save(); dotCtx.setLineDash([4,4]);
    dotCtx.beginPath(); dotCtx.moveTo(saccadeStart.x*W,saccadeStart.y*H); dotCtx.lineTo(sGX*W,sGY*H);
    dotCtx.strokeStyle='rgba(224,26,0,0.6)'; dotCtx.lineWidth=1.5; dotCtx.stroke();
    dotCtx.setLineDash([]); dotCtx.restore();
  }
}

function drawScanPath(ts) {
  const recent=scanPathHistory.slice(-14);
  if (recent.length<1) return;
  const W=dotCanvas.width, H=dotCanvas.height, total=recent.length;
  if (recent.length>=2) {
    dotCtx.save(); dotCtx.setLineDash([4,6]);
    dotCtx.strokeStyle='rgba(224,26,0,0.6)'; dotCtx.lineWidth=1.5;
    dotCtx.beginPath();
    for (let i=0;i<recent.length;i++) {
      const {x,y}=recent[i];
      i===0 ? dotCtx.moveTo(x*W,y*H) : dotCtx.lineTo(x*W,y*H);
    }
    dotCtx.stroke(); dotCtx.setLineDash([]); dotCtx.restore();
  }
  for (let i=0;i<total;i++) {
    const {x,y}=recent[i];
    const cx=x*W, cy=y*H;
    const isNewest=i===total-1;
    const r=isNewest ? 12+Math.sin(ts/300)*2 : 11;
    dotCtx.beginPath(); dotCtx.arc(cx,cy,r,0,Math.PI*2);
    dotCtx.strokeStyle='rgba(224,26,0,1)'; dotCtx.lineWidth=2; dotCtx.stroke();
    dotCtx.fillStyle='rgba(224,26,0,1)';
    dotCtx.font='bold 9px Heebo'; dotCtx.textAlign='center'; dotCtx.textBaseline='middle';
    dotCtx.fillText(i+1,cx,cy);
    dotCtx.textBaseline='alphabetic';
  }
}

function drawHeatmap() {
  let maxVal=0;
  for (let i=0;i<heatmap.length;i++) { if (heatmap[i]>maxVal) maxVal=heatmap[i]; }
  if (maxVal<0.01) return;
  heatCtx.clearRect(0,0,W_HEAT,H_HEAT);
  const img=heatCtx.createImageData(W_HEAT,H_HEAT);
  const d=img.data;
  for (let i=0;i<W_HEAT*H_HEAT;i++) {
    const val=heatmap[i]/maxVal;
    if (val<0.15) continue;
    let r,g,b;
    if      (val<0.25) { const t=(val-0.15)/0.10; r=0; g=Math.round(t*255); b=255; }
    else if (val<0.50) { const t=(val-0.25)/0.25; r=0; g=255; b=Math.round((1-t)*255); }
    else if (val<0.75) { const t=(val-0.50)/0.25; r=Math.round(t*255); g=255; b=0; }
    else               { const t=(val-0.75)/0.25; r=255; g=Math.round((1-t)*255); b=0; }
    d[i*4]=r; d[i*4+1]=g; d[i*4+2]=b; d[i*4+3]=Math.min(255,val*220);
  }
  heatCtx.putImageData(img,0,0);
  const W=dotCanvas.width, H=dotCanvas.height;
  dotCtx.globalAlpha=0.72;
  dotCtx.drawImage(heatCanvas,0,0,W,H);
  dotCtx.globalAlpha=1;
}

function drawFirstFix(ts) {
  const W=dotCanvas.width, H=dotCanvas.height;
  if (!firstFix) {
    dotCtx.fillStyle='rgba(150,150,150,0.7)';
    dotCtx.font='300 11px Heebo'; dotCtx.textAlign='center'; dotCtx.textBaseline='middle';
    dotCtx.fillText('WAITING FOR FIRST FIXATION',W/2,H/2);
    dotCtx.textBaseline='alphabetic';
    return;
  }
  const cx=firstFix.x*W, cy=firstFix.y*H;
  const pulse=20+Math.sin(ts/400)*5;
  dotCtx.beginPath(); dotCtx.arc(cx,cy,pulse,0,Math.PI*2);
  dotCtx.strokeStyle='rgba(224,26,0,0.35)'; dotCtx.lineWidth=1.5; dotCtx.stroke();
  dotCtx.beginPath(); dotCtx.arc(cx,cy,14,0,Math.PI*2);
  dotCtx.fillStyle='rgba(224,26,0,1)'; dotCtx.fill();
  dotCtx.strokeStyle='rgba(224,26,0,1)'; dotCtx.lineWidth=2; dotCtx.stroke();
  const offset = (firstFix.startTs - firstFixModeTs) / 1000;
  const textY = cy - 46;
  dotCtx.textAlign='center'; dotCtx.textBaseline='alphabetic';
  dotCtx.fillStyle='rgba(224,26,0,1)';
  dotCtx.font='bold 11px Heebo';
  dotCtx.fillText('FIRST FIXATION', cx, textY);
  dotCtx.font='300 9px Heebo';
  dotCtx.fillText(`+${offset.toFixed(2)}s`, cx, textY + 14);
}

function drawFrame(ts) {
  const W=dotCanvas.width, H=dotCanvas.height;
  if (!W||!H) return;
  dotCtx.clearRect(0,0,W,H);

  if (activeMode==='HEATMAP')   drawHeatmap();
  if (activeMode==='SCANPATH')  drawScanPath(ts);
  if (activeMode==='SACCADE')   drawSaccades(ts);
  if (activeMode==='FIXATION')  drawFixations(ts);
  if (activeMode==='FIRSTFIX')  drawFirstFix(ts);
  if (activeMode==='GAZE')      drawGazeMode();

  annLayer.style.opacity = activeMode==='GAZE' ? '1' : '0';
  gazeDot.style.display  = activeMode==='GAZE' ? '' : 'none';
}

/* ══════════════════════════════════════════════════════════════════════
   GAZE APPLICATION — driven by the SIMULATED target instead of a sensor
   ══════════════════════════════════════════════════════════════════════ */

function applyGaze(ts) {
  const dt = lastGazeTs ? Math.min((ts-lastGazeTs)/1000,0.05) : 0;
  lastGazeTs = ts;

  // נדידה איטית לעבר יעד המבט המדומה, ואז אותו lerp שהיה קיים במקור
  rawGX += (simGX - rawGX) * SIM_DRIFT_LERP;
  rawGY += (simGY - rawGY) * SIM_DRIFT_LERP;

  sGX += (rawGX-sGX)*GAZE_LERP;
  sGY += (rawGY-sGY)*GAZE_LERP;

  // מזין את מד היציבות באותו אופן שבו שימש קודם באפר ההיסט של הראש
  offXBuf.push(sGX); if (offXBuf.length>BUF_MAX) offXBuf.shift();
  offYBuf.push(sGY); if (offYBuf.length>BUF_MAX) offYBuf.shift();

  const W=videoWrapper.offsetWidth, H=videoWrapper.offsetHeight;
  if (!W||!H) return;

  const gpx=sGX*W, gpy=sGY*H;
  const rect=videoWrapper.getBoundingClientRect();
  gazeDot.style.left=(rect.left+gpx)+'px';
  gazeDot.style.top =(rect.top +gpy)+'px';

  window._gazeHistory.push({x:sGX,y:sGY,ts});
  if (window._gazeHistory.length>90) window._gazeHistory.shift();

  if (activeMode==='GAZE') {
    const scanSpeed=aoiPool.filter(a=>a.lastVisitTs>ts-2000).length;
    const _gh=window._gazeHistory.slice(-8);
    const _mx=_gh.reduce((s,p)=>s+p.x,0)/_gh.length;
    const _my=_gh.reduce((s,p)=>s+p.y,0)/_gh.length;
    const microMovement=_gh.reduce((s,p)=>s+Math.hypot(p.x-_mx,p.y-_my),0)/_gh.length;
    applyDotGaze(ts,gpx,gpy,W,H,scanSpeed,microMovement);
    applyAOIGaze(ts,scanSpeed,microMovement,dt);
  }
}

/* ══════════════════════════════════════════════════════════════════════
   SIMULATED GAZE DRIVER — picks a new random target every 1.4–3.2s
   ══════════════════════════════════════════════════════════════════════ */

function pickNewSimTarget() {
  simGX = 0.12 + Math.random() * 0.76;
  simGY = 0.12 + Math.random() * 0.76;
  const dwell = SIM_MIN_DWELL + Math.random() * (SIM_MAX_DWELL - SIM_MIN_DWELL);
  setTimeout(pickNewSimTarget, dwell);
}

/* ══════════════════════════════════════════════════════════════════════
   AUTO MODE CYCLING — replaces the manual mode-selection UI
   ══════════════════════════════════════════════════════════════════════ */

function setActiveMode(id) {
  activeMode = id;
  const idx = MODE_ORDER.indexOf(id);
  modeIndicatorName.textContent = MODE_LABELS[id] || id;
  modeIndicatorIdx.textContent  = String(idx+1).padStart(2,'0') + ' / ' + String(MODE_ORDER.length).padStart(2,'0');

  if (id === 'FIRSTFIX') {
    firstFix = null; firstFixDone = false; firstFixModeTs = performance.now();
  }
  if (id === 'SCANPATH') {
    scanPathHistory = [];
  }
  if (id !== 'GAZE') {
    annLayer.style.opacity = '0';
    gazeDot.style.display  = 'none';
  }
}

function startModeCycling() {
  let idx = 0;
  setActiveMode(MODE_ORDER[idx]);
  setInterval(() => {
    idx = (idx + 1) % MODE_ORDER.length;
    setActiveMode(MODE_ORDER[idx]);
  }, MODE_DWELL_MS);
}

/* ══════════════════════════════════════════════════════════════════════
   MAIN LOOP
   ══════════════════════════════════════════════════════════════════════ */

function mainLoop(ts) {
  applyGaze(ts);

  updateFixations(ts);
  updateSaccades(ts);
  updateHeatmap();
  updateFirstFix();

  if (activeMode==='GAZE') {
    if (ts-lastAnaTs>ANA_INTERVAL) { analyzeDots(); lastAnaTs=ts; }
    if (ts-lastAoiTs>AOI_INTERVAL) { analyzeAOI();  lastAoiTs=ts; }
  }

  drawFrame(ts);
  requestAnimationFrame(mainLoop);
}

/* ══════════════════════════════════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════════════════════════════════ */

function sizeWrapper(){ dotCanvas.width=window.innerWidth; dotCanvas.height=window.innerHeight; }

async function boot() {
  buildDotPool();
  sizeWrapper();
  mainVideo.addEventListener('loadedmetadata', sizeWrapper);
  window.addEventListener('resize', sizeWrapper);
  if (mainVideo.readyState < 2) await new Promise(r => mainVideo.addEventListener('canplay', r, { once:true }));

  heatCanvas = document.createElement('canvas');
  heatCanvas.width = W_HEAT; heatCanvas.height = H_HEAT;
  heatCtx = heatCanvas.getContext('2d');

  mainVideo.play().catch(() => {});
  sessionStartTs = Date.now();

  analyzeDots(); analyzeAOI();
  lastAnaTs = lastAoiTs = performance.now();

  pickNewSimTarget();
  startModeCycling();

  requestAnimationFrame(mainLoop);
}

boot();
</script>
