<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    background: #c8e8f5;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  /* ── רקע הוידאו ── */
  #bgVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* ── שכבת הנקודות האדומות ── */
  #dotsLayer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .dot {
    position: absolute;
    left: var(--x);
    top: var(--y);
    width: 9px;
    height: 9px;
    margin: -4.5px 0 0 -4.5px;
    border-radius: 50%;
    background: #FF0000;
    opacity: 0;
    animation: dotPulse var(--dur, 3.4s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  @keyframes dotPulse {
    0%   { opacity: 0; }
    18%  { opacity: 0; }
    20%  { opacity: 1; }
    55%  { opacity: 1; }
    80%  { opacity: 0; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="stage">
  <video id="bgVideo" autoplay muted playsinline>
    <source src="sky.mp4" type="video/mp4">
  </video>

  <script>
    // ── ניגון הלוך-חזור (ping-pong): במקום לוואידאו לקפוץ להתחלה
    // כשהוא מגיע לסוף, הוא מתהפך ומתחיל לנגן אחורה עד שהוא מגיע
    // לתחילת הקובץ, ואז שוב קדימה - ולחוזר חלילה.
    // דפדפנים לא תומכים בניגון אחורה אמיתי (playbackRate שלילי),
    // אז זה מבוצע ידנית על ידי עדכון currentTime בכל פריים.
    (function () {
      var vid = document.getElementById('bgVideo');
      var SPEED = 0.6;              // מהירות יחסית למקור (0.6 = 60%)
      var direction = 1;            // 1 = קדימה, -1 = אחורה
      var lastTs = null;
      var ready = false;

      vid.addEventListener('loadedmetadata', function () {
        ready = true;
        vid.pause(); // הניגון מבוצע כולו ידנית דרך currentTime
        requestAnimationFrame(step);
      });

      function step(ts) {
        if (!ready) { requestAnimationFrame(step); return; }
        if (lastTs === null) lastTs = ts;
        var deltaSec = (ts - lastTs) / 1000;
        lastTs = ts;

        var newTime = vid.currentTime + direction * SPEED * deltaSec;

        if (newTime >= vid.duration) {
          newTime = vid.duration;
          direction = -1;
        } else if (newTime <= 0) {
          newTime = 0;
          direction = 1;
        }

        vid.currentTime = newTime;
        requestAnimationFrame(step);
      }
    })();
  </script>

  <div id="dotsLayer"></div>
</div>

<script>
  // ── יצירת שדה נקודות אדומות קטנות במיקומים אקראיים ──
  var DOT_COUNT = 70;           // כמות הנקודות - אפשר לשנות
  var MIN_DUR = 2.5, MAX_DUR = 5.5;   // טווח משך האנימציה (שניות)
  var MAX_DELAY = 5;             // עיכוב מקסימלי לפני שכל נקודה מתחילה (שניות)

  var layer = document.getElementById('dotsLayer');
  var frag = document.createDocumentFragment();

  for (var i = 0; i < DOT_COUNT; i++) {
    var dot = document.createElement('span');
    dot.className = 'dot';
    var x = (Math.random() * 100).toFixed(2) + '%';
    var y = (Math.random() * 100).toFixed(2) + '%';
    var delay = (Math.random() * MAX_DELAY).toFixed(2) + 's';
    var dur = (MIN_DUR + Math.random() * (MAX_DUR - MIN_DUR)).toFixed(2) + 's';
    dot.style.setProperty('--x', x);
    dot.style.setProperty('--y', y);
    dot.style.setProperty('--delay', delay);
    dot.style.setProperty('--dur', dur);
    frag.appendChild(dot);
  }
  layer.appendChild(frag);
</script>

</body>
</html>
